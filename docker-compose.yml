services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: habitduel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_password}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  migrate:
    build: .
    working_dir: /app/server
    command: ["/app/bin/migrate"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: habitduel
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-your_password}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    logging: *default-logging

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: habitduel
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-your_password}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  adminer:
    image: adminer:4.8.1
    profiles: ["tools"]
    restart: unless-stopped
    ports:
      - "8088:8080"
    depends_on:
      db:
        condition: service_healthy
    logging: *default-logging

  dozzle:
    image: amir20/dozzle:v8.14.6
    profiles: ["observability"]
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging: *default-logging

  k6:
    image: grafana/k6:0.49.0
    profiles: ["load"]
    depends_on:
      server:
        condition: service_healthy
    environment:
      BASE_URL: http://server:8080
      K6_VUS: ${K6_VUS:-20}
      K6_DURATION: ${K6_DURATION:-30s}
    command:
      - run
      - --summary-export=/results/api-summary.json
      - /scripts/api-load.js
    volumes:
      - ./load-tests/k6:/scripts
      - ./load-tests/results:/results
    logging: *default-logging

volumes:
  pgdata:
