name: habitduel
description: "HabitDuel competitive habit tracking app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.0

  # Networking
  dio: ^5.4.0

  # Secure storage (JWT tokens)
  flutter_secure_storage: ^9.0.0

  # Local storage
  shared_preferences: ^2.2.2

  # Date formatting
  intl: ^0.19.0

  # WebSocket
  web_socket_channel: ^3.0.1

  # Local notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/app_icon.png"
  adaptive_icon_background: "#FFF7ED"
  adaptive_icon_foreground: "assets/branding/app_icon.png"
  min_sdk_android: 21
